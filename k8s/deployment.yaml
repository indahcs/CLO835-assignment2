apiVersion: apps/v1
kind: Deployment
metadata:
  name: clo835-app
  labels:
    app: clo835-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clo835-app
  template:
    metadata:
      labels:
        app: clo835-app
    spec:
      containers:
        - name: clo835-app
          image: icstyoningrum/clo835-assignment2:0.2
          ports:
            - containerPort: 8080
          resources: 
            requests: 
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
            livenessProbe: 
              httpGet: 
                path: /healthz 
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
            readinessProbe:
              httpGet:
               path: /readz 
               port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

